name: Build and Upload to App Store

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
        if [ -n "$XCODE_APP" ]; then
          sudo xcode-select -s "/Applications/$XCODE_APP"
        else
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP"
        fi
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Set build number
      run: |
        BUILD_NUM=$(( ${{ github.run_number }} + 300 ))
        echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV
        sed -i "" "s/CURRENT_PROJECT_VERSION: [0-9]*/CURRENT_PROJECT_VERSION: $BUILD_NUM/" project.yml

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Set up ASC API Key
      env:
        ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8
        cp ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 /tmp/asc_key.p8

    - name: Reclaim CI development certificate slot
      run: |
        gem install jwt --no-document
        ruby << 'RUBY'
        require "jwt"
        require "json"
        require "net/http"
        require "openssl"
        require "time"
        require "uri"

        key_id = "WDXGY9WX55"
        issuer_id = "2be0734f-943a-4d61-9dc9-5d9045c46fec"
        private_key = OpenSSL::PKey.read(File.read("/tmp/asc_key.p8"))
        token = JWT.encode(
          { iss: issuer_id, iat: Time.now.to_i, exp: Time.now.to_i + 1200, aud: "appstoreconnect-v1" },
          private_key,
          "ES256",
          { kid: key_id }
        )

        def request(uri, token, method = Net::HTTP::Get)
          req = method.new(uri)
          req["Authorization"] = "Bearer #{token}"
          Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) { |http| http.request(req) }
        end

        development_types = ["DEVELOPMENT", "IOS_DEVELOPMENT"]
        uri = URI("https://api.appstoreconnect.apple.com/v1/certificates?limit=200")
        res = request(uri, token)
        abort("Certificate list failed: #{res.code} #{res.body}") unless res.is_a?(Net::HTTPSuccess)

        certs = JSON.parse(res.body).fetch("data", [])
        development_certs = certs.select do |cert|
          attrs = cert.fetch("attributes", {})
          development_types.include?(attrs["certificateType"])
        end

        ci_certs = development_certs.select do |cert|
          attrs = cert.fetch("attributes", {})
          text = [attrs["displayName"], attrs["name"]].compact.join(" ")
          text.include?("Created via API") || text.include?(key_id)
        end
        ci_certs = [development_certs.min_by { |cert| Time.parse(cert.fetch("attributes", {})["expirationDate"]) }] if ci_certs.empty? && development_certs.any?

        ci_certs.each do |cert|
          attrs = cert.fetch("attributes", {})
          label = attrs["displayName"] || attrs["name"] || cert["id"]
          delete_uri = URI("https://api.appstoreconnect.apple.com/v1/certificates/#{cert["id"]}")
          delete_res = request(delete_uri, token, Net::HTTP::Delete)
          abort("Certificate delete failed for #{label}: #{delete_res.code} #{delete_res.body}") unless delete_res.code == "204"
          puts "Revoked stale CI development certificate: #{label}"
        end

        puts "No stale CI development certificates found." if ci_certs.empty?
        RUBY

    - name: Build Archive
      run: |
        xcodebuild archive \
          -scheme PeeVsZombies \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath build/PeeVsZombies.xcarchive \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM=83VGKGSQUH \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Export IPA
      run: |
        cat > export_options.plist << 'PLIST'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0"><dict>
          <key>method</key><string>app-store-connect</string>
          <key>destination</key><string>export</string>
          <key>teamID</key><string>83VGKGSQUH</string>
        </dict></plist>
        PLIST
        xcodebuild -exportArchive \
          -archivePath build/PeeVsZombies.xcarchive \
          -exportPath build/export \
          -exportOptionsPlist export_options.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Upload IPA
      run: |
        xcrun altool --upload-app \
          -f build/export/PeeVsZombies.ipa \
          -t ios \
          --apiKey WDXGY9WX55 \
          --apiIssuer 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Add uploaded build to TestFlight group
      run: |
        ruby << 'RUBY'
        require "jwt"
        require "json"
        require "net/http"
        require "openssl"
        require "uri"

        key_id = "WDXGY9WX55"
        issuer_id = "2be0734f-943a-4d61-9dc9-5d9045c46fec"
        bundle_id = "com.tokyonasu.peevsZombies"
        build_number = ENV.fetch("BUILD_NUM")
        group_name = "Internal Testers"
        private_key = OpenSSL::PKey.read(File.read("/tmp/asc_key.p8"))
        token = JWT.encode(
          { iss: issuer_id, iat: Time.now.to_i, exp: Time.now.to_i + 1200, aud: "appstoreconnect-v1" },
          private_key,
          "ES256",
          { kid: key_id }
        )

        def request(uri, token, method = Net::HTTP::Get, body = nil)
          req = method.new(uri)
          req["Authorization"] = "Bearer #{token}"
          req["Content-Type"] = "application/json" if body
          req.body = body if body
          Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) { |http| http.request(req) }
        end

        def get_json(path, token, params = {})
          uri = URI("https://api.appstoreconnect.apple.com/v1#{path}")
          uri.query = URI.encode_www_form(params) unless params.empty?
          res = request(uri, token)
          abort("App Store Connect GET #{path} failed: #{res.code} #{res.body}") unless res.is_a?(Net::HTTPSuccess)
          JSON.parse(res.body)
        end

        app = get_json("/apps", token, { "filter[bundleId]" => bundle_id, "limit" => 1 }).fetch("data").first
        abort("App not found for #{bundle_id}") unless app

        build = get_json("/builds", token, { "filter[app]" => app["id"], "filter[version]" => build_number, "limit" => 1 }).fetch("data").first
        abort("Build #{build_number} not found in App Store Connect") unless build

        group = get_json("/betaGroups", token, { "filter[app]" => app["id"], "limit" => 50 }).fetch("data").find do |candidate|
          candidate.fetch("attributes", {}).fetch("name", nil) == group_name
        end
        abort("TestFlight group not found: #{group_name}") unless group

        uri = URI("https://api.appstoreconnect.apple.com/v1/betaGroups/#{group["id"]}/relationships/builds")
        body = JSON.dump({ data: [{ type: "builds", id: build["id"] }] })
        res = request(uri, token, Net::HTTP::Post, body)
        abort("Adding build #{build_number} to #{group_name} failed: #{res.code} #{res.body}") unless res.code == "204" || res.is_a?(Net::HTTPSuccess)
        puts "Added build #{build_number} to TestFlight group: #{group_name}"
        RUBY
